<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>找不到页面 · 褚遂良 · 古画</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css?v=8" />
    <style>
      .nf {
        max-width: 560px;
        margin: 0 auto;
        padding: clamp(96px, 16vh, 160px) clamp(20px, 5vw, 48px);
        text-align: center;
      }
      .nf__code {
        font-size: clamp(56px, 10vw, 96px);
        font-weight: 700;
        letter-spacing: 0.1em;
        color: var(--accent);
        margin: 0 0 24px;
        line-height: 1;
      }
      .nf__title {
        font-size: clamp(18px, 2.2vw, 22px);
        color: var(--ink);
        font-weight: 500;
        margin: 0 0 16px;
      }
      .nf__note {
        font-size: clamp(14px, 1.6vw, 16px);
        line-height: 1.85;
        color: var(--ink-soft);
        font-style: italic;
        margin: 0 0 40px;
      }
      .nf__home {
        display: inline-block;
        font-size: 13px;
        letter-spacing: 0.15em;
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px dashed var(--accent);
        padding-bottom: 2px;
        transition: color 0.2s;
      }
      .nf__home:hover { color: var(--accent-deep); }
    </style>
  </head>
  <body>
    <main class="nf">
      <p class="nf__code">404</p>
      <h1 class="nf__title">这张纸上没有字</h1>
      <p class="nf__note">
        你要找的页面或许从未立起，
        或许像《房玄龄碑》的那二千余字一样，
        已经风化得只剩轮廓。
      </p>
      <a class="nf__home" href="/">← 回到褚遂良总览</a>
    </main>
  </body>
</html>
