  - article [ref=e518]:
    - paragraph [ref=e519]: 这卷里出现最多的字是"之"，27 次；其次是"天"，16 次；再次是"入"，14 次。 它们一遍遍地写下来，每一次落笔的角度都不一样。 这就是为什么后世认它是楷书范本—— 不是因为它整齐，而是因为它在整齐里反复偏离。
