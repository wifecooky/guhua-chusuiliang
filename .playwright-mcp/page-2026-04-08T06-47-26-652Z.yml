  - article [ref=e7]:
    - paragraph [ref=e8]: 公元 658 年前后，褚遂良在生命的最后几年，写下了这卷《阴符经》。 全卷四百余字，是他楷书最成熟的体段—— 法度森严却带着那种独属于他的、轻而薄的气质， 像是一支细笔在纸上提住了气息，舍不得落下。
    - paragraph [ref=e9]:
      - text: 下面是全文。
      - strong [ref=e10]: 每一个字都可以点。
      - text: 点开后，那一句的释文会从下面长出来。 《阴符经》写得极短极绕， 一句话往往要顶住《道德经》一整章—— 所以读它最好的方式不是逐字，而是逐句。
